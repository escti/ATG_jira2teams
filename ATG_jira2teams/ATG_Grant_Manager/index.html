<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auditoria de Grants Oracle</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <style>
        body { 
            background-color: #121212; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-top: 20px;
        }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .table-dark {
            --bs-table-bg: #1e1e1e;
            --bs-table-striped-bg: #252525;
        }
        /* Ajustes do DataTables no modo escuro */
        .dataTables_wrapper .dataTables_length, 
        .dataTables_wrapper .dataTables_filter, 
        .dataTables_wrapper .dataTables_info, 
        .dataTables_wrapper .dataTables_processing, 
        .dataTables_wrapper .dataTables_paginate {
            color: #aaa !important;
        }
        .page-link {
            background-color: #2d2d2d;
            border-color: #444;
            color: #fff;
        }
        .page-item.active .page-link {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container-fluid px-4">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="text-primary fw-bold">AUDITORIA DE GRANTS</h2>
            <p class="text-muted mb-0">Histórico completo de solicitações e revogações</p>
        </div>
        <a href="index.cgi" class="btn btn-outline-primary">
            &larr; Nova Solicitação
        </a>
    </div>

    <div class="card p-3">
        <div class="table-responsive">
            <table id="auditTable" class="table table-dark table-striped table-hover w-100">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuário Destino</th>
                        <th>Privilégio</th>
                        <th>Objeto</th>
                        <th>Solicitante</th>
                        <th>Data Início</th>
                        <th>Expira em</th>
                        <th>Status</th>
                        <th>Observações</th>
                    </tr>
                </thead>
                <tbody>
                    $TABLE_ROWS
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="text-center mt-4 text-muted small">
        Atualizado em: $(date "+%d/%m/%Y %H:%M:%S")
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
    $(document).ready(function () {
        $('#auditTable').DataTable({
            "order": [[ 0, "desc" ]], // Ordena por ID decrescente
            "language": {
                "url": "//cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json"
            },
            "pageLength": 10,
            "lengthMenu": [10, 25, 50, 100]
        });
    });
</script>

</body>
</html>
