<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jira Dashboard - ATG</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'accent-blue': '#4Facfe',
                        'accent-purple': '#00f2fe',
                        'glass-bg': 'rgba(255, 255, 255, 0.7)',
                        'dark-glass-bg': 'rgba(40, 40, 45, 0.7)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply min-h-screen transition-colors duration-300;
                background-image: radial-gradient(circle at 50% 50%, #fdfbfb 0%, #ebedee 100%);
                background-attachment: fixed;
            }
            .dark body {
                background-image: radial-gradient(circle at 50% 50%, #1c1c1c 0%, #0d0d0d 100%);
            }
        }

        @layer components {
            .glass-card {
                @apply bg-white/70 dark:bg-[#28282d]/70 backdrop-blur-xl border border-white/40 dark:border-white/10 rounded-[20px] shadow-xl overflow-hidden transition-all duration-300;
            }
            .glass-card:hover {
                @apply -translate-y-1 shadow-2xl shadow-blue-500/10;
            }
            .card-header-styled {
                @apply font-semibold px-6 py-3.5 text-lg tracking-wide flex items-center gap-2.5;
            }
            .btn-modern {
                @apply px-4 py-1.5 rounded-full font-semibold transition-all duration-300 text-sm active:scale-95;
            }
            .issue-row {
                @apply transition-all duration-200 border-b border-black/5 dark:border-white/5 hover:bg-white/90 dark:hover:bg-white/5 hover:scale-[1.01];
            }
        }

        /* Otimização de scrollbar conforme SKILL.md */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            @apply rounded-full;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body class="text-slate-800 dark:text-slate-100 pb-12">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-black/80 backdrop-blur-md border-b border-white/20 dark:border-white/5 shadow-sm py-4 mb-8">
        <div class="container mx-auto px-6 lg:px-12 flex flex-col lg:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <i class="bi bi-kanban text-3xl align-middle bg-gradient-to-r from-accent-blue to-accent-purple bg-clip-text text-transparent"></i>
                <span class="text-2xl font-bold tracking-tight bg-gradient-to-r from-accent-blue to-accent-purple bg-clip-text text-transparent">
                    ATG Monitor Flow
                </span>
            </div>

            <div class="flex flex-wrap items-center justify-center gap-4 lg:gap-6">
                <div class="hidden sm:block text-right">
                    <div id="last-update" class="text-[10px] uppercase font-bold tracking-widest text-slate-400">Atualizando...</div>
                </div>

                <button id="btn-refresh" onclick="manualRefresh()" class="flex items-center gap-2 bg-white dark:bg-zinc-800 text-slate-700 dark:text-slate-200 px-6 py-2 rounded-full font-bold shadow-sm border border-black/5 dark:border-white/5 hover:shadow-md transition-all active:scale-95">
                    <i class="bi bi-arrow-clockwise"></i> Sincronizar
                </button>

                <div class="flex items-center bg-white dark:bg-zinc-800 p-1 pr-4 rounded-full shadow-sm border border-black/5 dark:border-white/5">
                    <div class="bg-blue-50 dark:bg-blue-900/30 rounded-full p-2 px-3 mr-2 text-blue-500">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <span class="hidden md:inline text-xs font-bold text-slate-400 uppercase tracking-tighter mr-2">Visão:</span>
                    <select id="user-select" class="bg-transparent border-0 font-bold text-sm focus:ring-0 cursor-pointer outline-none">
                        {% for user in users %}
                        <option value="{{ user }}" class="dark:bg-zinc-900">{{ user }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button id="btn-theme" onclick="toggleTheme()" class="bg-white dark:bg-zinc-800 p-2.5 px-4 rounded-full shadow-sm border border-black/5 dark:border-white/5 transition-colors group">
                    <i class="bi bi-moon-stars-fill text-blue-500 group-hover:text-blue-400 transition-colors" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Error Alert -->
    <div class="container mx-auto px-6 lg:px-12 mb-8 hidden" id="error-msg">
        <div class="bg-white/90 dark:bg-zinc-900/90 backdrop-blur-md border-l-4 border-red-500 p-6 rounded-2xl shadow-lg flex items-center gap-5">
            <i class="bi bi-exclamation-triangle-fill text-3xl text-red-500"></i>
            <div>
                <h5 class="font-bold text-red-500 text-lg">Rejeição da API do Jira</h5>
                <span id="error-txt" class="text-sm opacity-80">Sua query JQL contém parâmetros inválidos.</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-6 lg:px-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Pessoais Column -->
            <div class="lg:col-span-8 space-y-8">
                
                <!-- Aguardando -->
                <div class="glass-card">
                    <div class="card-header-styled bg-gradient-to-r from-blue-500 to-cyan-400 text-white">
                        <i class="bi bi-hourglass-split"></i> 
                        <span>Chamados Aguardando Atendimento</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <tbody id="pessoais_aguardando">
                                <tr>
                                    <td class="p-8">
                                        <div class="animate-pulse flex flex-col gap-3">
                                            <div class="h-5 bg-slate-200 dark:bg-slate-700 rounded w-full"></div>
                                            <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-3/4"></div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- SLA Crítico -->
                <div class="glass-card">
                    <div class="card-header-styled bg-gradient-to-r from-amber-400 to-orange-500 text-white">
                        <i class="bi bi-exclamation-triangle"></i> 
                        <span>SLA Crítico (< 1h)</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <tbody id="pessoais_sla_critico">
                                <tr>
                                    <td class="p-8"><div class="animate-pulse h-5 bg-slate-200 dark:bg-slate-700 rounded"></div></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Sem Interação -->
                <div class="glass-card">
                    <div class="card-header-styled bg-gradient-to-r from-slate-400 to-slate-600 text-white">
                        <i class="bi bi-clock-history"></i> 
                        <span>Sem Interação (+3 dias)</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <tbody id="pessoais_sem_interacao">
                                <tr>
                                    <td class="p-8"><div class="animate-pulse h-5 bg-slate-200 dark:bg-slate-700 rounded"></div></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Fila DBA Column -->
            <div class="lg:col-span-4">
                <div class="glass-card ring-2 ring-red-500/20">
                    <div class="card-header-styled bg-gradient-to-r from-red-600 to-rose-500 text-white">
                        <i class="bi bi-fire"></i> 
                        <span>Fila DBA Urgente</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <tbody id="dba_urgente">
                                <tr>
                                    <td class="p-8"><div class="animate-pulse h-5 bg-slate-200 dark:bg-slate-700 rounded"></div></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 mt-12 border-t border-black/5 dark:border-white/5 text-slate-400 text-xs tracking-wide">
        ATG Monitor Flow &copy; 2026 | Versão <span class="font-bold text-blue-500/80">0.2.0</span>
    </footer>

    <script>
        const loadingHtml = `<tr><td class="p-8"><div class="animate-pulse flex flex-col gap-3"><div class="h-5 bg-slate-200 dark:bg-slate-700 rounded w-full"></div><div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div></div></td></tr>`;

        async function fetchData() {
            try {
                const selectedUser = document.getElementById('user-select').value;
                const url = selectedUser ? `/api/data?user=${encodeURIComponent(selectedUser)}` : '/api/data';

                const response = await fetch(url);
                if (!response.ok) {
                    const errData = await response.json().catch(() => null);
                    if (errData && errData.error) throw new Error(errData.error);
                    throw new Error(`Erro HTTP: ${response.status}`);
                }

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                updateTable('pessoais_aguardando', data.pessoais_aguardando);
                updateTable('pessoais_sla_critico', data.pessoais_sla_critico);
                updateTable('pessoais_sem_interacao', data.pessoais_sem_interacao);
                updateTable('dba_urgente', data.dba_urgente);

                document.getElementById('last-update').innerText = 'Sincronizado às ' + new Date().toLocaleTimeString();
                document.getElementById('error-msg').classList.add('hidden');

            } catch (error) {
                console.error('Erro:', error);
                const errorMsg = document.getElementById('error-msg');
                document.getElementById('error-txt').innerText = error.message;
                errorMsg.classList.remove('hidden');

                const emptyState = '<tr><td class="p-8 text-center text-slate-400 italic">Falha ao carregar API</td></tr>';
                ['pessoais_aguardando', 'pessoais_sla_critico', 'pessoais_sem_interacao', 'dba_urgente'].forEach(id => {
                    document.getElementById(id).innerHTML = emptyState;
                });
            }
        }

        function updateTable(id, issues) {
            const tbody = document.getElementById(id);
            if (!issues || issues.length === 0) {
                tbody.innerHTML = `<tr><td class="p-12 text-center text-slate-400/60 bg-white/10"><i class="bi bi-check2-circle text-5xl text-green-500/30 block mb-4"></i><span class="font-semibold">Nenhuma pendência encontrada.</span></td></tr>`;
                return;
            }

            tbody.innerHTML = issues.map(issue => `
                <tr class="issue-row">
                    <td class="p-5 px-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-1.5">
                                <span class="bg-slate-500/10 dark:bg-white/10 text-slate-500 dark:text-slate-300 text-[11px] font-bold px-3 py-1 rounded-full border border-black/5 dark:border-white/10">${issue.key}</span>
                                <h4 class="font-bold text-slate-700 dark:text-slate-200">${issue.summary}</h4>
                            </div>
                            <div class="text-[11px] text-slate-400 font-medium flex items-center gap-1.5">
                                <i class="bi bi-calendar-check"></i> Atualizado: ${issue.updated}
                            </div>
                        </div>
                        <a href="${issue.url}" target="_blank" class="btn-modern bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 hover:-translate-y-0.5 whitespace-nowrap">
                            Abrir <i class="bi bi-box-arrow-up-right ml-1"></i>
                        </a>
                    </td>
                </tr>
            `).join('');
        }

        function setLoaders() {
            ['pessoais_aguardando', 'pessoais_sla_critico', 'pessoais_sem_interacao', 'dba_urgente'].forEach(id => {
                document.getElementById(id).innerHTML = loadingHtml;
            });
        }

        setTimeout(fetchData, 400);
        setInterval(fetchData, 300000);

        async function manualRefresh() {
            const btn = document.getElementById('btn-refresh');
            const original = btn.innerHTML;
            btn.innerHTML = '<div class="animate-spin h-4 w-4 border-2 border-current border-t-transparent rounded-full mr-2"></div> Sincronizando...';
            btn.disabled = true;
            setLoaders();
            await fetchData();
            btn.innerHTML = original;
            btn.disabled = false;
        }

        document.getElementById('user-select').addEventListener('change', manualRefresh);

        function setTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                document.getElementById('theme-icon').classList.replace('text-blue-500', 'text-yellow-400');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                document.getElementById('theme-icon').classList.replace('text-yellow-400', 'text-blue-500');
            }
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            setTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
        }

        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(savedTheme);
    </script>
</body>
</html>
