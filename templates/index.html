<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jira Dashboard - ATG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card-header { font-weight: bold; border-radius: 10px 10px 0 0 !important; }
        .bg-urgent { background-color: #dc3545; color: white; }
        .bg-warning-custom { background-color: #ffc107; color: #000; }
        .bg-info-custom { background-color: #0d6efd; color: white; }
        .issue-row:hover { background-color: #f8f9fa; }
        .refresh-time { font-size: 0.8rem; color: #6c757d; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">ATG Jira Monitor</span>
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <span id="last-update" class="text-light refresh-time me-2">Atualizando...</span>
                    <button id="btn-refresh" class="btn btn-sm btn-outline-light" onclick="manualRefresh()">
                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true" style="display:none"></span>Atualizar Agora
                    </button>
                </div>
                <div class="d-flex align-items-center">
                    <span class="text-light me-2">Usuário:</span>
                    <select id="user-select" class="form-select form-select-sm" style="width: 200px;">
                        <option value="user1">User 1</option>
                        <option value="user2">User 2</option>
                        <option value="user3">User 3</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <!-- Container de mensagem de erro -->
    <div id="error-msg" class="alert alert-danger" style="display:none; margin-bottom: 20px;">
        <i class="bi bi-exclamation-triangle-fill"></i> <strong>Erro:</strong>
    </div>

    <div class="container">
        <div class="row">
            <!-- Pessoais -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-info-custom">⏳ Chamados Aguardando Atendimento</div>
                    <div class="card-body p-0">
                        <table class="table mb-0">
                            <tbody id="pessoais_aguardando"></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-warning-custom">⚠️ SLA Crítico (< 1h)</div>
                    <div class="card-body p-0">
                        <table class="table mb-0">
                            <tbody id="pessoais_sla_critico"></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-secondary text-white">🕰️ Sem Interação (+3 dias)</div>
                    <div class="card-body p-0">
                        <table class="table mb-0">
                            <tbody id="pessoais_sem_interacao"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Fila DBA -->
            <div class="col-md-4">
                <div class="card border-danger">
                    <div class="card-header bg-urgent">🔥 Fila DBA Urgente</div>
                    <div class="card-body p-0">
                        <table class="table mb-0">
                            <tbody id="dba_urgente"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status} ${response.statusText}`);
                }
                const data = await response.json();
                
                updateTable('pessoais_aguardando', data.pessoais_aguardando);
                updateTable('pessoais_sla_critico', data.pessoais_sla_critico);
                updateTable('pessoais_sem_interacao', data.pessoais_sem_interacao);
                updateTable('dba_urgente', data.dba_urgente);
                
                document.getElementById('last-update').innerText = 'Última atualização: ' + new Date().toLocaleTimeString();
                
                // Esconde mensagem de erro se existir
                const errorMsg = document.getElementById('error-msg');
                if (errorMsg) errorMsg.style.display = 'none';
                
            } catch (error) {
                console.error('Erro ao buscar dados:', error);
                
                // Mostra mensagem de erro na tela
                const errorMsg = document.getElementById('error-msg');
                if (errorMsg) {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = error.message || 'Erro desconhecido ao carregar dados';
                }
            }
        }

        function updateTable(id, issues) {
            const tbody = document.getElementById(id);
            if (!issues || issues.length === 0) {
                tbody.innerHTML = '<tr><td class="p-3 text-muted">Nenhum chamado encontrado.</td></tr>';
                return;
            }
            
            tbody.innerHTML = issues.map(issue => `
                <tr class="issue-row">
                    <td class="p-3">
                        <strong>${issue.key}</strong> - ${issue.summary}<br>
                        <small class="text-muted">Atualizado em: ${issue.updated}</small>
                        <a href="${issue.url}" target="_blank" class="btn btn-sm btn-outline-primary float-end">Abrir</a>
                    </td>
                </tr>
            `).join('');
        }

        // Atualiza a cada 5 minutos
        fetchData();
        setInterval(fetchData, 300000);

        // Função para atualizar manualmente ao clicar no botão
        async function manualRefresh() {
            const btn = document.getElementById('btn-refresh');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>Atualizando...';
            btn.disabled = true;
            
            await fetchData();
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        }

        // Função para alternar usuário
        async function switchUser() {
            const btn = document.getElementById('btn-refresh');
            const originalText = btn.innerHTML;
            const user = document.getElementById('user-select').value;
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>Atualizando...';
            btn.disabled = true;
            
            // Adiciona parâmetro de usuário na requisição
            const response = await fetch('/api/data?user=' + encodeURIComponent(user));
            if (!response.ok) {
                throw new Error(`Erro HTTP: ${response.status} ${response.statusText}`);
            }
            const data = await response.json();
            
            updateTable('pessoais_aguardando', data.pessoais_aguardando);
            updateTable('pessoais_sla_critico', data.pessoais_sla_critico);
            updateTable('pessoais_sem_interacao', data.pessoais_sem_interacao);
            updateTable('dba_urgente', data.dba_urgente);
            
            document.getElementById('last-update').innerText = 'Última atualização: ' + new Date().toLocaleTimeString();
            
            // Esconde mensagem de erro se existir
            const errorMsg = document.getElementById('error-msg');
            if (errorMsg) errorMsg.style.display = 'none';
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        }

        // Evento de mudança no dropdown
        document.getElementById('user-select').addEventListener('change', switchUser);
    </script>
</body>
</html>
