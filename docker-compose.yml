version: '3.8'

services:
  jira-web:
    build: .
    container_name: jira-web-dashboard
    ports:
      - "5000:5000"
    environment:
      - JIRA_SERVER=https://suaempresa.atlassian.net
      - JIRA_USERNAME=seu@email.com
      - JIRA_PASSWORD=seu-api-token
      - TEAMS_WEBHOOK_URL=https://teams.webhook.office.com/webhookb2/xxxx
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    command: python3 app.py

  jira-notifier:
    build: .
    container_name: jira-notifier
    environment:
      - JIRA_SERVER=https://suaempresa.atlassian.net
      - JIRA_USERNAME=seu@email.com
      - JIRA_PASSWORD=seu-api-token
      - TEAMS_WEBHOOK_URL=https://teams.webhook.office.com/webhookb2/xxxx
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    command: python3 jira_to_teams.py